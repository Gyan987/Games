<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A tiny car racing game — short, fun, and a little competitive.">
  <title>Car Racing Game</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: url(27471.jpg) no-repeat center;
      background-size: cover;
      height: 100vh;
      display: grid;
      place-items: center;
    }
    #road {
      background: url(road.png) repeat-y;
      height: 1200vh;
      width: 50vw;
      position: relative;
      top: -80vh;
      z-index: -9;
    }
    #start, #restart {
      position: absolute;
      z-index: 100;
      font-size: 2rem;
      background-color: rgb(245, 99, 99);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
    #restart { display: none; }
    #score, #speed, #lives {
      position: absolute;
      top: 20px;
      font-size: 1.5rem;
      padding: 5px 15px;
      background-color: white;
      border-radius: 20px;
    }
    #score { left: 20px; }
    #speed { left: 200px; }
    #lives { left: 380px; }
    .ecarimg, .obstacle {
      width: 80px;
      border: 2px solid rgba(0,0,0,0.08);
    }
    .mycarimg {
      width: 90px;
      border: 2px solid rgba(40,150,200,0.95);
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(40,150,200,0.18);
      transition: transform 150ms ease;
    }
    .obstacle {
      width: 60px;
      height: 60px;
      border: 2px solid #111;
      border-radius: 8px;
      background: repeating-linear-gradient(
        45deg,
        #f39c12,
        #f39c12 10px,
        #111 10px,
        #111 20px
      );
    }
    #mycar {
      width: 100px;
      height: 100px;
      position: relative;
      top: 15vh;
    }

    /* Buttons: subtle hover and motion to feel hand-tuned */
    #start, #restart { transition: transform .12s ease, box-shadow .12s ease; }
    #start:hover, #restart:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 20px rgba(0,0,0,0.18); }

    /* Player car visual polish and tilt */
    .mycarimg {
      will-change: transform, opacity;
      transition: transform 150ms ease, opacity 180ms ease;
    }
    .mycarimg.tilt-left { transform: rotate(-6deg) translateX(-4px); }
    .mycarimg.tilt-right { transform: rotate(6deg) translateX(4px); }
    .mycarimg.invulnerable { opacity: 0.6; filter: drop-shadow(0 0 8px rgba(255,80,80,0.18)); }

    /* Small speed bar next to speed text */
    #speedbar { position: absolute; top: 54px; left: 200px; width: 120px; height: 8px; background: rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; }
    #speedbar > i { display: block; height: 100%; width: 30%; background: linear-gradient(90deg,#37d67a,#3ab3ff); transition: width 220ms linear; }

    /* Enemy cars now swerve left and right */
    @keyframes ecar1 {
      0% { top: -30vh; left: 200px; }
      50% { left: 350px; }
      100% { top: 100vh; left: 250px; }
    }
    @keyframes ecar2 {
      0% { top: -50vh; left: 100px; }
      50% { left: 200px; }
      100% { top: 100vh; left: 150px; }
    }
    @keyframes ecar3 {
      0% { top: -60vh; left: -100px; }
      50% { left: -50px; }
      100% { top: 100vh; left: -120px; }
    }
    @keyframes ecar4 {
      0% { top: -80vh; left: -300px; }
      50% { left: -200px; }
      100% { top: 100vh; left: -250px; }
    }

    @keyframes roadanimation {
      from { top: -1100vh; }
      to { top: -200vh; }
    }
  </style>
</head>

<body>
  <div id="score">Score : 0</div>
  <div id="speed">Speed : 3</div>
  <div id="speedbar"><i></i></div>
  <div id="lives">Lives : 3</div>
  <button id="start" title="Begin">Let's go!</button>
  <button id="restart">Try again</button>

  <div style="position:absolute; top:70px; right:20px; color:#fff; font-size:0.9rem; text-shadow:0 1px 2px rgba(0,0,0,0.6);">Tip: Arrow keys or WASD to move — press 'P' to pause</div>

  <div>
    <div id="enemycar1"><img id="ecarimg1" class="ecarimg" src="car2.png"></div>
    <div id="enemycar2"><img id="ecarimg2" class="ecarimg" src="car3.png"></div>
    <div id="enemycar3"><img id="ecarimg3" class="ecarimg" src="car2.png"></div>
    <div id="enemycar4"><img id="ecarimg4" class="ecarimg" src="car3.png"></div>
  </div>

  <div id="mycar"><img id="mycarimg" class="mycarimg" src="car1.png"></div>
  <div id="road"></div>

  <!-- Obstacles -->
  <div id="obstacle1" class="obstacle" style="position:relative; top:-200px; left:150px;"></div>
  <div id="obstacle2" class="obstacle" style="position:relative; top:-400px; left:250px;"></div>

  <script>
    let t = 15, l = 0, speed = 3, lives = 3, n = 0;
    let gameInterval;
    let isInvulnerable = false;
    let isPaused = false;
    let tiltTimer = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setMyCarPosition() {
      // Keep the player inside a practical viewport window so controls stay usable.
      t = clamp(t, -10, 70);
      l = clamp(l, -20, 20);
      document.getElementById("mycar").style.top = `${t}vh`;
      document.getElementById("mycar").style.left = `${l}vw`;
    }

    function collide(a, b) {
      return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
    }

    function gameTick() {
      document.getElementById("score").innerText = `Score : ${String(n).padStart(3,'0')}`;
      n++;

      // update speed bar
      try {
        document.getElementById('speedbar').firstElementChild.style.width = Math.min(100, speed * 10) + '%';
      } catch (e) {}

      let mycar = document.getElementById("mycarimg").getBoundingClientRect();
      let e1 = document.getElementById("ecarimg1").getBoundingClientRect();
      let e2 = document.getElementById("ecarimg2").getBoundingClientRect();
      let e3 = document.getElementById("ecarimg3").getBoundingClientRect();
      let e4 = document.getElementById("ecarimg4").getBoundingClientRect();
      let o1 = document.getElementById("obstacle1").getBoundingClientRect();
      let o2 = document.getElementById("obstacle2").getBoundingClientRect();

      if (!isInvulnerable && (collide(mycar, e1) || collide(mycar, e2) || collide(mycar, e3) || collide(mycar, e4) || collide(mycar, o1) || collide(mycar, o2))) {
        isInvulnerable = true;
        lives--;
        document.getElementById("lives").innerText = "Lives : " + lives;
        document.getElementById("mycarimg").classList.add('invulnerable');
        setTimeout(() => {
          isInvulnerable = false;
          document.getElementById("mycarimg").classList.remove('invulnerable');
        }, 700);
        if (lives <= 0) {
          clearInterval(gameInterval);
          gameInterval = null;
          alert("Game Over — nice try!");
          document.getElementById("restart").style.display = 'block';
          document.getElementById("start").style.display = 'block';
          document.getElementById("start").innerText = 'Try again';
        }
      }

      // Level progression: increase speed every 50 points
      if (n % 50 === 0) {
        speed++;
        document.getElementById("speed").innerText = "Speed : " + speed;
      }
    }

    function startGame() {
      clearInterval(gameInterval);
      gameInterval = null;
      isPaused = false;
      document.getElementById("start").style.display = 'none';
      document.getElementById("restart").style.display = 'none';
      document.getElementById("road").style.animation = 'roadanimation 20s linear infinite';
      document.getElementById("road").style.animationPlayState = 'running';
      t = 15;
      l = 0;
      lives = 3; n = 0; speed = 3;
      isInvulnerable = false;
      setMyCarPosition();
      document.getElementById("lives").innerText = "Lives : " + lives;
      document.getElementById("speed").innerText = "Speed : " + speed;

      // Enemy car animations with swerving
      ['enemycar1','enemycar2','enemycar3','enemycar4'].forEach((id, idx) => {
        const speedMap = [3,5,6,4];
        const anim = `ecar${idx+1} ${speedMap[idx]}s linear infinite`;
        document.getElementById(id).style.animation = anim;
        document.getElementById(id).style.animationPlayState = 'running';
      });

      // Score & collision loop
      gameInterval = setInterval(gameTick, 100);
    }

    document.getElementById("start").addEventListener("click", startGame);
    document.getElementById("restart").addEventListener("click", startGame);

    // Controls
    window.addEventListener("keydown", function (x) {
      // Toggle pause with 'P'
      if (x.keyCode == 80) {
        if (gameInterval) {
          clearInterval(gameInterval);
          gameInterval = null;
          isPaused = true;
          document.getElementById("road").style.animationPlayState = 'paused';
          ['enemycar1','enemycar2','enemycar3','enemycar4'].forEach(id => {
            document.getElementById(id).style.animationPlayState = 'paused';
          });
          document.getElementById("start").style.display = 'block';
          document.getElementById("start").innerText = 'Resume';
        } else {
          // resume
          if (!isPaused) return; // if never started, ignore
          gameInterval = setInterval(gameTick, 100);
          isPaused = false;
          document.getElementById("road").style.animationPlayState = 'running';
          ['enemycar1','enemycar2','enemycar3','enemycar4'].forEach(id => {
            document.getElementById(id).style.animationPlayState = 'running';
          });
          document.getElementById("start").style.display = 'none';
          document.getElementById("start").innerText = "Let's go!";
        }
        return;
      }

      if (!gameInterval) return; // ignore movement when game not running

      if (x.keyCode == 38) t -= speed; // Up
      if (x.keyCode == 40) t += speed; // Down
      if (x.keyCode == 37) { l -= speed; document.getElementById('mycarimg').classList.add('tilt-left'); clearTimeout(tiltTimer); tiltTimer = setTimeout(()=>{document.getElementById('mycarimg').classList.remove('tilt-left');},160);} // Left
      if (x.keyCode == 39) { l += speed; document.getElementById('mycarimg').classList.add('tilt-right'); clearTimeout(tiltTimer); tiltTimer = setTimeout(()=>{document.getElementById('mycarimg').classList.remove('tilt-right');},160);} // Right
      if (x.keyCode == 87) t -= speed; // W
      if (x.keyCode == 83) t += speed; // S
      if (x.keyCode == 65) { l -= speed; document.getElementById('mycarimg').classList.add('tilt-left'); clearTimeout(tiltTimer); tiltTimer = setTimeout(()=>{document.getElementById('mycarimg').classList.remove('tilt-left');},160);} // A
      if (x.keyCode == 68) { l += speed; document.getElementById('mycarimg').classList.add('tilt-right'); clearTimeout(tiltTimer); tiltTimer = setTimeout(()=>{document.getElementById('mycarimg').classList.remove('tilt-right');},160);} // D
      if (x.keyCode == 187) speed++;   // '+'
      if (x.keyCode == 189 && speed > 1) speed--; // '-'
      setMyCarPosition();
      document.getElementById("speed").innerText = "Speed : " + speed;
      try { document.getElementById('speedbar').firstElementChild.style.width = Math.min(100, speed*10) + '%'; } catch(e) {}
    });
  </script>
</body>
</html>
